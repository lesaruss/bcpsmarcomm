<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find It Fast - BCPS Back to School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  #fif-module, #fif-module * { box-sizing: border-box; }
  #fif-module {
    --fif-accent: #ba4e24;
    --fif-accent-dark: #8c3b1b;
    --fif-gold: #D9A404;
    --fif-text: #1a1a1a;
    --fif-secondary: #555555;
    --fif-muted: #767676;
    --fif-border: #e2e6ea;
    --fif-bg-tint: #f8f0ec;
    font-family: "Open Sans", "Segoe UI", Arial, Helvetica, sans-serif;
    background: #ffffff;
    color: var(--fif-text);
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 24px 32px;
    border: 1px solid var(--fif-border);
    border-radius: 10px;
  }
  #fif-module .fif-eyebrow {
    color: var(--fif-accent);
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-size: 13px;
    margin: 0 0 6px;
  }
  #fif-module h2 {
    margin: 0 0 8px;
    font-size: 28px;
    line-height: 1.2;
    color: var(--fif-text);
  }
  #fif-module .fif-intro {
    margin: 0 0 20px;
    color: var(--fif-secondary);
    font-size: 15px;
    max-width: 640px;
  }
  #fif-module .fif-search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
  }
  #fif-module .fif-search-wrap {
    position: relative;
    flex: 1;
  }
  #fif-module .fif-search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    color: var(--fif-muted);
  }
  #fif-module input[type="search"] {
    width: 100%;
    padding: 12px 14px 12px 38px;
    border: 1px solid #e5e5e5;
    border-radius: 6px;
    font-size: 15px;
    color: var(--fif-text);
  }
  #fif-module input[type="search"]:focus,
  #fif-module button:focus-visible {
    outline: 3px solid var(--fif-gold);
    outline-offset: 2px;
  }
  #fif-module .fif-clear-btn {
    background: #e5e5e5;
    border: 1px solid #e5e5e5;
    border-radius: 100px;
    padding: 0 18px;
    font-size: 14px;
    font-weight: 700;
    color: #262626;
    cursor: pointer;
  }
  #fif-module .fif-clear-btn:hover { background: rgba(220, 221, 224, 0.8); color: #232327; }
  #fif-module .fif-cats {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 22px;
  }
  #fif-module .fif-cat-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border-radius: 100px;
    border: 1px solid #e5e5e5;
    background: #e5e5e5;
    color: #262626;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  #fif-module .fif-cat-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  #fif-module .fif-cat-btn:hover { background: rgba(220, 221, 224, 0.8); color: #232327; }
  #fif-module .fif-cat-btn[aria-pressed="true"] {
    background: rgba(0, 0, 0, 0.7);
    border-color: #262626;
    color: #ffffff;
  }
  #fif-module .fif-count {
    font-size: 13px;
    color: var(--fif-muted);
    margin-bottom: 10px;
  }
  #fif-module .fif-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }
  #fif-module .fif-card {
    border: 1px solid var(--fif-border);
    border-radius: 8px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: #ffffff;
  }
  #fif-module .fif-card-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 700;
    color: var(--fif-accent);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  #fif-module .fif-card-tag svg { width: 14px; height: 14px; }
  #fif-module .fif-card h3 {
    margin: 0;
    font-size: 16px;
    line-height: 1.3;
  }
  #fif-module .fif-card h3 a {
    color: var(--fif-text);
    text-decoration: none;
  }
  #fif-module .fif-card h3 a:hover,
  #fif-module .fif-card h3 a:focus-visible {
    color: var(--fif-accent);
    text-decoration: underline;
  }
  #fif-module .fif-card p {
    margin: 0;
    font-size: 13.5px;
    color: var(--fif-secondary);
    line-height: 1.45;
  }
  #fif-module .fif-card .fif-visit {
    margin-top: auto;
    font-size: 13px;
    font-weight: 700;
    color: var(--fif-accent-dark);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  #fif-module .fif-card .fif-visit:hover,
  #fif-module .fif-card .fif-visit:focus-visible { text-decoration: underline; }
  #fif-module .fif-card .fif-visit svg { width: 13px; height: 13px; }
  #fif-module .fif-empty {
    padding: 30px 10px;
    text-align: center;
    color: var(--fif-muted);
    font-size: 14px;
  }
  #fif-module .fif-pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-top: 20px;
  }
  #fif-module .fif-page-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #ffffff;
    border: 1px solid #c7ced4;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 14px;
    font-weight: 600;
    color: var(--fif-text);
    cursor: pointer;
  }
  #fif-module .fif-page-btn svg { width: 14px; height: 14px; }
  #fif-module .fif-page-btn:hover:not(:disabled) { background: var(--fif-bg-tint); }
  #fif-module .fif-page-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  #fif-module .fif-page-info {
    font-size: 13px;
    color: var(--fif-secondary);
    font-weight: 600;
  }
  #fif-module .fif-sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }
  @media (max-width: 520px) {
    #fif-module { padding: 20px 16px 24px; }
    #fif-module h2 { font-size: 22px; }
    #fif-module .fif-search-row { flex-direction: column; }
    #fif-module .fif-clear-btn { padding: 10px 14px; }
    #fif-module .fif-pagination { gap: 8px; }
    #fif-module .fif-page-btn span.fif-page-btn-label { display: none; }
  }
</style>
</head>
<body>

<section id="fif-module" aria-labelledby="fif-heading">
  <p class="fif-eyebrow">Back To School 2026/27</p>
  <h2 id="fif-heading">Find It Fast</h2>
  <p class="fif-intro">Search or browse by topic to get straight to enrollment forms, calendars, family resources, and more. Every link opens the source page directly.</p>

  <div class="fif-search-row">
    <div class="fif-search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <label for="fif-search-input" class="fif-sr-only">Search Find It Fast</label>
      <input type="search" id="fif-search-input" placeholder="Search for a topic, form, or resource">
    </div>
    <button type="button" class="fif-clear-btn" id="fif-clear">Clear</button>
  </div>

  <div class="fif-cats" role="group" aria-label="Filter by category" id="fif-cats"></div>

  <p class="fif-count" id="fif-count" aria-live="polite"></p>
  <div class="fif-grid" id="fif-grid"></div>
  <p class="fif-empty" id="fif-empty" hidden>No matches yet. Try a different word or clear the search.</p>

  <nav class="fif-pagination" id="fif-pagination" aria-label="Find It Fast results pages" hidden>
    <button type="button" class="fif-page-btn" id="fif-prev" aria-label="Previous page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
      <span class="fif-page-btn-label">Previous</span>
    </button>
    <span class="fif-page-info" id="fif-page-info" aria-live="polite"></span>
    <button type="button" class="fif-page-btn" id="fif-next" aria-label="Next page">
      <span class="fif-page-btn-label">Next</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </nav>
</section>

<script>
(function () {
  var PAGE_SIZE = 6;

  var ICONS = {
    enroll: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="3" width="12" height="18" rx="2"/><path d="M9 3v2h6V3"/><path d="M9 12l2 2 4-4"/></svg>',
    calendar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/></svg>',
    forms: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h6"/></svg>',
    support: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 8.3a4.5 4.5 0 0 0-7.6-3.1L12 6.4l-1.2-1.2A4.5 4.5 0 1 0 4.3 11.6L12 19l7.7-7.4a4.5 4.5 0 0 0 1.1-3.3z"/></svg>',
    portal: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M8 20h8M12 16v4"/></svg>',
    transport: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="18" height="11" rx="2"/><path d="M3 12h18M7 17v2M17 17v2"/><circle cx="7.5" cy="17" r="0.5"/><circle cx="16.5" cy="17" r="0.5"/></svg>'
  };

  // Content is editable live by BCPS marcomm staff (Find It Fast admin page
  // at bcpsmarcomm.com/bcps?page=find-it-fast) and stored in Supabase, so it
  // is fetched at runtime rather than hardcoded here.
  var SUPABASE_URL = "https://fwbhwfxpncrsfhttimna.supabase.co";
  var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3Ymh3ZnhwbmNyc2ZodHRpbW5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjAxMzksImV4cCI6MjA5MDIzNjEzOX0.9mxjK0bn5WATCbNLWrHPakD6yHUDtHFHrOaklPnWkOA";

  var CATEGORIES = [{ id: "all", label: "All", icon: "" }];
  var LINKS = [];

  function supabaseGet(table, query) {
    return fetch(SUPABASE_URL + "/rest/v1/" + table + "?" + query, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: "Bearer " + SUPABASE_ANON_KEY }
    }).then(function (r) {
      if (!r.ok) throw new Error(table + " fetch failed: " + r.status);
      return r.json();
    });
  }

  function loadContent() {
    return Promise.all([
      supabaseGet("bcps_fif_categories", "select=slug,label,icon_key,sort_order&order=sort_order.asc"),
      supabaseGet("bcps_fif_links", "select=category_slug,title,url,blurb,sort_order&order=sort_order.asc")
    ]).then(function (results) {
      var cats = results[0], fetchedLinks = results[1];
      CATEGORIES = [{ id: "all", label: "All", icon: "" }].concat(cats.map(function (c) {
        return { id: c.slug, label: c.label, icon: ICONS[c.icon_key] || "" };
      }));
      LINKS = fetchedLinks.map(function (l) {
        return { cat: l.category_slug, title: l.title, url: l.url, blurb: l.blurb || "" };
      });
    });
  }

  var state = { cat: "all", q: "", page: 1 };

  var catsEl = document.getElementById("fif-cats");
  var gridEl = document.getElementById("fif-grid");
  var countEl = document.getElementById("fif-count");
  var emptyEl = document.getElementById("fif-empty");
  var searchEl = document.getElementById("fif-search-input");
  var clearBtn = document.getElementById("fif-clear");
  var paginationEl = document.getElementById("fif-pagination");
  var pageInfoEl = document.getElementById("fif-page-info");
  var prevBtn = document.getElementById("fif-prev");
  var nextBtn = document.getElementById("fif-next");

  // Auto height for iframe embeds. Harmless when pasted directly into a page
  // (no iframe parent), required when loaded via <iframe src="...">.
  var lastPostedHeight = 0;
  function postHeight() {
    var height = Math.ceil(document.body.getBoundingClientRect().height);
    if (Math.abs(height - lastPostedHeight) < 2) return;
    lastPostedHeight = height;
    window.parent.postMessage({ type: "fif-resize", slug: "find-it-fast", height: height }, "*");
  }

  function externalIcon() {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg>';
  }

  function renderCats() {
    catsEl.innerHTML = CATEGORIES.map(function (c) {
      return '<button type="button" class="fif-cat-btn" data-cat="' + c.id + '" aria-pressed="' + (state.cat === c.id) + '">' +
        c.icon + '<span>' + c.label + '</span></button>';
    }).join("");
    Array.prototype.forEach.call(catsEl.querySelectorAll(".fif-cat-btn"), function (btn) {
      btn.addEventListener("click", function () {
        state.cat = btn.getAttribute("data-cat");
        state.page = 1;
        render();
      });
    });
  }

  function matches(link) {
    var inCat = state.cat === "all" || link.cat === state.cat;
    if (!inCat) return false;
    if (!state.q) return true;
    var haystack = (link.title + " " + link.blurb).toLowerCase();
    return haystack.indexOf(state.q.toLowerCase()) !== -1;
  }

  function catLabel(id) {
    for (var i = 0; i < CATEGORIES.length; i++) {
      if (CATEGORIES[i].id === id) return CATEGORIES[i].label;
    }
    return "";
  }

  function renderPagination(total, totalPages) {
    if (totalPages <= 1) {
      paginationEl.hidden = true;
      return;
    }
    paginationEl.hidden = false;
    pageInfoEl.textContent = "Page " + state.page + " of " + totalPages;
    prevBtn.disabled = state.page <= 1;
    nextBtn.disabled = state.page >= totalPages;
  }

  function render(scrollTop) {
    Array.prototype.forEach.call(catsEl.querySelectorAll(".fif-cat-btn"), function (btn) {
      btn.setAttribute("aria-pressed", String(btn.getAttribute("data-cat") === state.cat));
    });

    var results = LINKS.filter(matches);
    var total = results.length;
    var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    if (state.page > totalPages) state.page = totalPages;
    if (state.page < 1) state.page = 1;

    if (total === 0) {
      countEl.textContent = "0 results";
      gridEl.innerHTML = "";
      emptyEl.hidden = false;
      paginationEl.hidden = true;
      postHeight();
      return;
    }
    emptyEl.hidden = true;

    var startIdx = (state.page - 1) * PAGE_SIZE;
    var pageResults = results.slice(startIdx, startIdx + PAGE_SIZE);
    var start = startIdx + 1;
    var end = startIdx + pageResults.length;
    countEl.textContent = "Showing " + start + "-" + end + " of " + total + (total === 1 ? " result" : " results");

    gridEl.innerHTML = pageResults.map(function (link) {
      return '<article class="fif-card">' +
        '<span class="fif-card-tag">' + ICONS[link.cat] + catLabel(link.cat) + '</span>' +
        '<h3><a href="' + link.url + '" target="_blank" rel="noopener noreferrer">' + link.title + '</a></h3>' +
        '<p>' + link.blurb + '</p>' +
        '<a class="fif-visit" href="' + link.url + '" target="_blank" rel="noopener noreferrer">Visit page' + externalIcon() + '</a>' +
        '</article>';
    }).join("");

    renderPagination(total, totalPages);
    postHeight();

    if (scrollTop) {
      var moduleEl = document.getElementById("fif-module");
      if (moduleEl && moduleEl.scrollIntoView) {
        moduleEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
    }
  }

  searchEl.addEventListener("input", function (e) {
    state.q = e.target.value;
    state.page = 1;
    render();
  });

  clearBtn.addEventListener("click", function () {
    state.q = "";
    state.cat = "all";
    state.page = 1;
    searchEl.value = "";
    render();
    searchEl.focus();
  });

  prevBtn.addEventListener("click", function () {
    if (state.page > 1) {
      state.page -= 1;
      render(true);
    }
  });

  nextBtn.addEventListener("click", function () {
    state.page += 1;
    render(true);
  });

  countEl.textContent = "Loading...";
  loadContent().then(function () {
    renderCats();
    render();
  }).catch(function (err) {
    countEl.textContent = "";
    emptyEl.hidden = false;
    emptyEl.textContent = "Find It Fast could not load right now. Please try again shortly.";
    if (window.console) console.error("Find It Fast load error:", err);
  });

  window.addEventListener("load", postHeight);
  window.addEventListener("resize", postHeight);
  if (window.ResizeObserver) {
    new ResizeObserver(postHeight).observe(document.body);
  } else {
    setInterval(postHeight, 500);
  }
})();
</script>

</body>
</html>
