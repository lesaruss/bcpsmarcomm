<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>School Marketing Guide | Broward County Public Schools</title>
<style>
  :root{--blue:#0F567E;--blue2:#1672A7;--orange:#F69820;--ink:#1a1a1a;--sec:#555;--muted:#767676;--line:#dfe7ec;--ltblue:#eef6fb;--ltblue2:#f6fafd;--green:#167512;--lock:#aab4bb;}
  *{box-sizing:border-box}
  body{margin:0;background:#fff;color:var(--ink);font-family:"Open Sans",Arial,sans-serif;line-height:1.55}
  .top{display:flex;align-items:center;gap:14px;border-bottom:3px solid var(--blue2);padding:16px 22px}
  .top img{height:40px}
  .top .t{font-weight:800;color:var(--blue);font-size:17px;line-height:1.15}
  .top .s{font-size:12px;color:var(--muted);font-weight:600}
  .wrap{max-width:none;margin:0;padding:24px 40px 70px}
  .shell{display:grid;grid-template-columns:1fr 244px;gap:30px;align-items:start}
  .main{min-width:0}
  /* right menu */
  .rail{position:sticky;top:18px;border:1px solid var(--line);border-radius:12px;padding:12px;background:var(--ltblue2)}
  .rail .rt{font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin:4px 6px 10px}
  .item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;font-size:13.5px;font-weight:700;color:var(--sec);border:1px solid transparent}
  .item .dot{width:22px;height:22px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;background:#e4ebf0;color:var(--muted)}
  .item .dot svg{width:13px;height:13px}
  .item.avail{cursor:pointer;color:var(--ink)}
  .item.avail:hover{background:#fff;border-color:var(--line)}
  .item.done .dot{background:var(--green);color:#fff}
  .item.current{background:#fff;border-color:var(--blue2);color:var(--blue)}
  .item.current .dot{background:var(--blue2);color:#fff}
  .item.locked{color:var(--lock);cursor:not-allowed}
  .item.locked .dot{background:#eef1f3;color:var(--lock)}
  /* content */
  h1{font-size:25px;color:var(--blue);margin:6px 0 8px;font-weight:800;line-height:1.2}
  h2{font-size:20px;color:var(--blue);margin:4px 0 4px;font-weight:800}
  .teach{background:var(--ltblue);border-left:4px solid var(--blue2);border-radius:8px;padding:13px 16px;margin:12px 0 20px;font-size:14.5px;color:var(--sec)}
  .teach b{color:var(--blue)}
  label{display:block;font-weight:700;font-size:14.5px;margin:18px 0 6px;color:var(--ink)}
  .hint{font-weight:400;color:var(--muted);font-size:12.5px}
  input[type=text],input[type=email],textarea,select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font:inherit;color:var(--ink);background:#fff}
  textarea{min-height:74px;resize:vertical}
  input:focus,textarea:focus,select:focus{outline:2px solid var(--blue2);outline-offset:1px;border-color:var(--blue2)}
  .checks{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
  .chk{display:flex;align-items:flex-start;gap:9px;border:1px solid var(--line);border-radius:8px;padding:10px 12px;cursor:pointer;font-size:14px}
  .chk input{margin-top:2px}
  .chk:hover{border-color:var(--blue2);background:var(--ltblue2)}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .row > div{flex:1;min-width:200px}
  .nav{display:flex;justify-content:space-between;margin-top:30px;gap:12px}
  button{font:inherit;font-weight:800;border:0;border-radius:9px;padding:12px 22px;cursor:pointer}
  .primary{background:var(--blue2);color:#fff}.primary:hover{background:var(--blue)}
  .ghost{background:#fff;color:var(--blue);border:1.5px solid var(--blue2)}.ghost:hover{background:var(--ltblue)}
  .cta{background:var(--orange);color:#1a1a1a}.cta:hover{filter:brightness(.95)}
  .intro ul{padding-left:20px}.intro li{margin-bottom:8px;font-size:15px}
  .pill{display:inline-block;background:var(--blue2);color:#fff;font-size:11px;font-weight:800;padding:3px 9px;border-radius:11px;text-transform:uppercase;letter-spacing:.04em}
  .plan{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-top:8px}
  .plan .ph{background:var(--blue);color:#fff;padding:16px 20px}.plan .ph .pt{font-size:19px;font-weight:800}.plan .ph .pm{font-size:13px;opacity:.9}
  .plan .pb{padding:6px 20px 18px}
  .plan section{border-bottom:1px solid var(--line);padding:15px 0}.plan section:last-child{border-bottom:0}
  .plan h3{font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--blue2);margin:0 0 7px;font-weight:800}
  .plan p{margin:0 0 7px;font-size:14.5px}.plan ul{margin:6px 0;padding-left:20px}.plan li{font-size:14px;margin-bottom:5px}
  .note{background:var(--ltblue);border-radius:8px;padding:13px 16px;font-size:14px;color:var(--sec);margin-top:14px}
  .confirm{text-align:center;padding:30px 16px}
  .confirm .big{width:62px;height:62px;border-radius:50%;background:var(--green);margin:0 auto 14px;display:flex;align-items:center;justify-content:center}
  .confirm .big svg{width:30px;height:30px}
  .err{background:#fdecec;border:1px solid #f3b9b9;color:#8a1c1c;border-radius:8px;padding:10px 14px;font-size:14px;margin-top:14px;display:none}
  .tip{margin:7px 0 2px;border:1px solid var(--line);border-radius:8px;background:var(--ltblue2)}
  .tip summary{cursor:pointer;list-style:none;padding:8px 30px 8px 12px;font-size:12.5px;font-weight:700;color:var(--blue2);position:relative}
  .tip summary::-webkit-details-marker{display:none}
  .tip summary::after{content:"+";position:absolute;right:13px;top:6px;font-size:16px;font-weight:800}
  .tip[open] summary::after{content:"\2013"}
  .tip .tbody{padding:0 14px 10px}
  .tip .tbody ul{margin:2px 0 0;padding-left:18px}
  .tip .tbody li{font-size:12.8px;line-height:1.45;margin-bottom:5px;color:var(--sec)}
  @media(max-width:760px){.shell{grid-template-columns:1fr}.rail{position:static;order:-1}.rail .rt{display:none}.rail{display:flex;gap:8px;overflow-x:auto;padding:10px}.item{white-space:nowrap;flex:0 0 auto;font-size:12px}.checks{grid-template-columns:1fr}}
</style>
</head>

const KEY_AUD=["Prospective families","Current families","Staff and faculty","Community and partners"];
const KEY_SITE=["Identity banner on homepage","News / announcements","Calendar of events","Clear call to action button"];

const state={school:"",contact:"",email:"",s1:{},s2:{},s3:{},s4:{}};
let step=0, maxStep=0;
const $=id=>document.getElementById(id);
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function chkGroup(name,items,picked){return '<div class="checks">'+items.map(x=>`<label class="chk"><input type="checkbox" data-g="${name}" value="${esc(x)}" ${(picked||[]).includes(x)?'checked':''}><span>${esc(x)}</span></label>`).join('')+'</div>'}
function getChecks(name){return [...document.querySelectorAll(`input[data-g="${name}"]:checked`)].map(c=>c.value)}
function opt(arr,sel){return '<option value=""></option>'+arr.map(a=>`<option ${a===sel?'selected':''}>${esc(a)}</option>`).join('')}
function tip(items){return `<details class="tip"><summary>How to answer this</summary><div class="tbody"><ul>${items.map(i=>`<li>${i}</li>`).join('')}</ul></div></details>`}

const CHECK='<svg viewBox="0 0 24 24" fill="none"><path d="M4 12.5l5 5L20 6" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const LOCK='<svg viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="9" rx="2" fill="currentColor"/><path d="M8 11V8a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="2" fill="none"/></svg>';
function renderRail(){
  $("rail").innerHTML='<div class="rt">Your progress</div>'+STEPS.map((label,k)=>{
    let cls,dot;
    if(k===step){cls='current';dot=(k+1)}
    else if(k<=maxStep){cls='avail'+(k<step?' done':'');dot=(k<step?CHECK:(k+1))}
    else {cls='locked';dot=LOCK}
    const click=(k<=maxStep&&k!==step)?`onclick="goto(${k})"`:'';
    return `<div class="item ${cls}" ${click}><span class="dot">${dot}</span><span>${label}</span></div>`;
  }).join('');
}

function render(){
  $("err").style.display='none';
  const v=$("view"), nav=$("nav");
  if(step===0){
    v.innerHTML=`<div class="intro"><span class="pill">15 minutes</span>
      <h1>Market your school with confidence.</h1>
      <div class="teach">You do not need any marketing experience. This guide asks plain-language questions about your school, helps you gather what you need, and builds a step-by-step plan you can follow. When you finish, a <b>MarComm marketing specialist</b> reviews it, fine-tunes it, and sends you the final version.</div>
      <p style="font-weight:700">You will walk through four areas:</p>
      <ul><li><b>Your story and message</b> &mdash; what makes your school worth choosing.</li>
      <li><b>Website readiness</b> &mdash; the first impression families get.</li>
      <li><b>Social media</b> &mdash; your everyday storytelling.</li>
      <li><b>Enrollment inquiries and tours</b> &mdash; turning interest into visits.</li></ul>
      <p class="hint" style="margin:12px 0 0;font-size:13px">Not sure how to answer something? Every question has a <b>How to answer this</b> link you can open for guidance and best practices.</p>
      <label>School name <span class="hint">Start typing and pick yours from the list.</span>
        <input type="text" id="f_school" list="schoolList" value="${esc(state.school)}" placeholder="Start typing your school..." autocomplete="off">
        <datalist id="schoolList">${SCHOOLS.map(s=>`<option value="${esc(s)}">`).join('')}</datalist></label>
      <div class="row"><div><label>Your name <input type="text" id="f_contact" value="${esc(state.contact)}" placeholder="Your name"></label></div>
      <div><label>Email <input type="email" id="f_email" value="${esc(state.email)}" placeholder="you@browardschools.com"></label></div></div></div>`;
    nav.innerHTML=`<span></span><button class="primary" onclick="next()">Get started &rarr;</button>`;
  }
  else if(step===1){
    v.innerHTML=`<span class="pill">Step 1 of 4</span><h2>Your story and message</h2>
      <div class="teach">Families choose schools they understand and trust. Get clear on <b>what makes your school special</b> and the one message you want every family to remember. This becomes the backbone of everything else.</div>
      <label>What makes your school special? <span class="hint">A few sentences in your own words.</span><textarea id="q11" placeholder="Our strengths, what families love, what we are proud of...">${esc(state.s1.story||'')}</textarea></label>
      ${tip(["Brainstorm with your team, do not do this alone. Ask what families say when they are happy here.","List what is genuinely different from nearby schools: a signature program, a tradition, results, the feel of the building.","Aim for 3 to 5 concrete things. Specifics beat general claims like we care about kids."])}<label>Your top proud points <span class="hint">2 to 4 specifics: programs, results, recognitions.</span><textarea id="q12" placeholder="e.g. STEM magnet, 95% attendance, award-winning arts...">${esc(state.s1.proud||'')}</textarea></label>
      ${tip(["Use evidence and numbers: a magnet or academy, an attendance or graduation rate, an award, a signature event.","Pull from this year so it feels current.","Skip generic praise like great teachers; name proof a parent could verify."])}<label>Who are you trying to reach?</label>${chkGroup('aud',KEY_AUD,state.s1.aud)}
      ${tip(["Most schools lead with prospective families, since the goal is enrollment.","Pick every group you actively communicate with; your main audience shapes your message and where you post.","If unsure, start with prospective and current families."])}<label>Your school in one sentence <span class="hint">The single message families should remember.</span><input type="text" id="q13" value="${esc(state.s1.msg||'')}" placeholder="At our school, every child is known, challenged, and celebrated."></label>${tip(["Write one promise a family will remember. Try: At [School], every child [benefit] so they [outcome].","Keep it short, specific, and human. Read it out loud.","Avoid jargon and acronyms a new parent would not know."])}`;
    backNext();
  }

    v.innerHTML=`<span class="pill">Step 2 of 4</span><h2>Website readiness</h2>
      <div class="teach">For most families your website is the <b>first impression</b>. The goal is a homepage that loads your identity, shows current news and events, and makes the next step obvious.</div>
      <label>Which of these does your homepage have today? <span class="hint">Check what exists. The rest become action items.</span></label>${chkGroup('site',KEY_SITE,state.s2.site)}
      ${tip(["Open your homepage and check each item as a first-time visitor would.","Identity banner = your name, logo, and a real photo up top. Clear call to action = an obvious Schedule a tour or Apply button.","Anything you cannot check becomes an action item in your plan."])}<label>Do you have current Magnet / Innovative / Specialized program pages?</label><select id="q21">${opt(['Yes, current','Some, need updates','No','Not applicable'],state.s2.programs)}</select>
      ${tip(["Magnet, Innovative, and Specialized program pages are top enrollment drivers.","Current means accurate for this year: dates, contacts, and what is actually offered.","If you are not sure, choose Some, need updates."])}<label>Are your Proud Points updated for this year?</label><select id="q22">${opt(['Yes','Need updating','We do not have them yet'],state.s2.proudpts)}</select>
      ${tip(["Proud Points are the highlights you want a first-time visitor to see.","Refresh them each year with recent wins so they do not feel stale."])}<label>What needs the most work on your site right now? <span class="hint">Optional.</span><textarea id="q23" placeholder="Outdated photos, no events, hard to find enrollment info...">${esc(state.s2.work||'')}</textarea></label>${tip(["Be honest; your specialist uses this to prioritize.","Common gaps: outdated photos, no upcoming events, and enrollment or contact info that is hard to find."])}`;
    backNext();
  }
  else if(step===3){
    v.innerHTML=`<span class="pill">Step 3 of 4</span><h2>Social media presence</h2>
      <div class="teach">Social media is your <b>daily storytelling</b>. You do not need every platform. Pick what you can keep up with, post consistently, and always point families back to your website or a tour.</div>
      <label>Which platforms are active for your school?</label>${chkGroup('plat',PLATFORMS,state.s3.plat)}
      ${tip(["Pick only what you can keep up with. One consistent account beats five neglected ones.","Facebook tends to reach parents; Instagram is strong for photos and younger families; YouTube is great for tour and highlight videos."])}<label>How often can you realistically post?</label><select id="q31">${opt(['A few times a week','Once a week','A few times a month','Daily'],state.s3.cadence)}</select>
      ${tip(["Choose a pace you can truly maintain. Consistency matters more than volume.","A real once a week you keep is better than a daily you abandon."])}<label>What stories will you tell?</label>${chkGroup('story',KEY_STORY,state.s3.themes)}
      ${tip(["Mix proof (achievement, academics) with personality (culture, traditions, events).","Real students and teachers and authentic moments outperform stock or generic posts."])}<label>Your primary call to action</label><select id="q32">${opt(['Visit our website','Schedule a tour','Apply / enroll','Attend an event'],state.s3.cta)}</select>${tip(["Every post should point somewhere. Pick the one action you most want families to take.","For enrollment, Schedule a tour is usually the strongest."])}`;
    backNext();
  }
  else if(step===4){
    v.innerHTML=`<span class="pill">Step 4 of 4</span><h2>Enrollment inquiries and tours</h2>
      <div class="teach">This is where interest becomes enrollment. Families notice <b>how quickly and warmly you respond</b>, and whether the visit matches the story they saw online. Make the path to a tour easy.</div>
      <label>Who responds to enrollment inquiries? <span class="hint">Name or role.</span><input type="text" id="q41" value="${esc(state.s4.owner||'')}" placeholder="e.g. Front office / Ms. Lopez"></label>
      ${tip(["Name a specific person or role so inquiries do not fall through the cracks.","Families notice a fast, warm, personal response."])}<label>Your response time goal</label><select id="q42">${opt(['Same day','Within 24 hours','Within 48 hours','We need to set one'],state.s4.time)}</select>
      ${tip(["Faster is better. Same day or within 24 hours sets you apart.","Set a goal your team can actually hit every time."])}<label>Do you offer tours, and how does a family schedule one?<input type="text" id="q43" value="${esc(state.s4.tour||'')}" placeholder="e.g. Yes, call the office or book on our website"></label>
      ${tip(["Make scheduling effortless: a button, a phone number, or a simple form.","The in-person visit should match the story families saw online."])}<label>Is your contact information visible and accurate on your website?</label><select id="q44">${opt(['Yes','Needs a check','No'],state.s4.contactok)}</select>${tip(["Phone, email, and address should be visible and correct on your homepage.","Test it yourself. Broken or old contact info quietly loses families."])}`;
    nav.innerHTML=`<button class="ghost" onclick="prev()">&larr; Back</button><button class="primary" onclick="next()">Generate my plan &rarr;</button>`;
  }
  else if(step===5){
    v.innerHTML=buildPlan();
    nav.innerHTML=`<button class="ghost" onclick="prev()">&larr; Back</button><button class="cta" id="sendBtn" onclick="send()">Send to my marketing specialist &rarr;</button>`;
  }
  else if(step===6){
    v.innerHTML=`<div class="confirm"><div class="big"><svg viewBox="0 0 24 24" fill="none"><path d="M4 12.5l5 5L20 6" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <h1>Your plan is on its way.</h1>
      <p style="font-size:15.5px;max-width:520px;margin:0 auto">Thanks, ${esc(state.school)}. Your draft marketing plan has been sent to the BCPS MarComm marketing team. A specialist will review it, refine it, and send the final version to <b>${esc(state.email||'your contact email')}</b>.</p>
      <div class="note" style="max-width:520px;margin:18px auto 0;text-align:left">What happens next: a marketing specialist confirms your plan is aligned to district branding, adjusts anything that needs it, and returns a finished, step-by-step plan you can start using right away.</div></div>`;
    nav.innerHTML='';
  }
  renderRail();
  window.scrollTo(0,0);
}
function backNext(){$("nav").innerHTML=`<button class="ghost" onclick="prev()">&larr; Back</button><button class="primary" onclick="next()">Continue &rarr;</button>`}
function val(id){const e=$(id);return e?e.value.trim():''}
function save(){
  if(step===0){state.school=val('f_school');state.contact=val('f_contact');state.email=val('f_email')}
  if(step===1){state.s1={story:val('q11'),proud:val('q12'),aud:getChecks('aud'),msg:val('q13')}}
  if(step===2){state.s2={site:getChecks('site'),programs:val('q21'),proudpts:val('q22'),work:val('q23')}}
  if(step===3){state.s3={plat:getChecks('plat'),cadence:val('q31'),themes:getChecks('story'),cta:val('q32')}}
  if(step===4){state.s4={owner:val('q41'),time:val('q42'),tour:val('q43'),contactok:val('q44')}}
}
function next(){save();if(step===0&&!state.school){showErr('Please choose your school to begin.');return}step++;if(step>maxStep)maxStep=step;render()}
function prev(){save();step--;render()}
function goto(k){if(k>maxStep)return;save();step=k;render()}
function showErr(m){const e=$("err");e.textContent=m;e.style.display='block';window.scrollTo(0,0)}
function li(arr){return arr&&arr.length?('<ul>'+arr.map(a=>`<li>${esc(a)}</li>`).join('')+'</ul>'):'<p style="color:#767676">Not specified.</p>'}
function buildPlan(){
  const s1=state.s1,s2=state.s2,s3=state.s3,s4=state.s4;
  const missing=KEY_SITE.filter(x=>!(s2.site||[]).includes(x));
  const cta=s3.cta||'Visit our website';
  const goal=`Move families from awareness to inquiry to enrollment by making "${esc(s1.msg||'our school story')}" visible everywhere and making "${esc(cta)}" the clear next step.`;
  return `<span class="pill">Draft plan</span><h2 style="margin-top:8px">Here is your marketing plan</h2>
  <p style="color:#555;font-size:14.5px">Review it below. When you send it, a marketing specialist will refine and finalize it.</p>
  <div class="plan"><div class="ph"><div class="pt">${esc(state.school||'Your school')} Marketing Plan</div><div class="pm">Broward County Public Schools &middot; MarComm &middot; draft for specialist review</div></div>
    <div class="pb">
      <section><h3>Your story and key message</h3><p><b>One-sentence message:</b> ${esc(s1.msg)||'<span style=\"color:#767676\">To be defined with your specialist.</span>'}</p><p><b>What makes us special:</b> ${esc(s1.story)||'<span style=\"color:#767676\">Not specified.</span>'}</p><p><b>Proud points to lead with:</b> ${esc(s1.proud)||'<span style=\"color:#767676\">Not specified.</span>'}</p></section>
      <section><h3>Goal</h3><p>${goal}</p></section>
      <section><h3>Priority audiences</h3>${li(s1.aud)}</section>
      <section><h3>Website action list</h3>${missing.length?('<p>Add or fix these on your homepage:</p>'+li(missing)):'<p>Your homepage covers the core components. Keep them current.</p>'}${s2.programs&&s2.programs!=='Yes, current'?`<p><b>Program pages:</b> ${esc(s2.programs)} &mdash; update before August.</p>`:''}${s2.proudpts&&s2.proudpts!=='Yes'?`<p><b>Proud Points:</b> ${esc(s2.proudpts)}.</p>`:''}${s2.work?`<p><b>You flagged:</b> ${esc(s2.work)}</p>`:''}</section>
      <section><h3>Social media plan</h3><p><b>Active on:</b> ${(s3.plat&&s3.plat.length)?s3.plat.map(esc).join(', '):'none yet (start with one)'}.</p><p><b>Posting cadence:</b> ${esc(s3.cadence)||'set a realistic cadence'}.</p><p><b>Story themes:</b></p>${li(s3.themes)}<p><b>Every post ends with one call to action:</b> ${esc(cta)}.</p></section>
      <section><h3>Enrollment inquiry and tour path</h3><p><b>Inquiries handled by:</b> ${esc(s4.owner)||'assign an owner'}.</p><p><b>Response time goal:</b> ${esc(s4.time)||'set a goal'}.</p><p><b>Tours:</b> ${esc(s4.tour)||'define how families schedule a tour'}.</p><p><b>Website contact info:</b> ${esc(s4.contactok)||'verify it is visible and accurate'}.</p></section>
      <section><h3>Next step</h3><p>A BCPS MarComm marketing specialist will confirm this plan against district branding, refine it, and return the finished version to you.</p></section>
    </div></div>
  <div class="note">Nothing is final yet. Sending shares this draft with the marketing team for review.</div>`;
}
async function send(){
  const btn=$("sendBtn");btn.disabled=true;btn.textContent='Sending...';
  try{
    const r=await fetch('/api/bcps/marketing-submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({school_name:state.school,contact_name:state.contact,contact_email:state.email,answers:{s1:state.s1,s2:state.s2,s3:state.s3,s4:state.s4},generated_plan:{html:buildPlan()}})});
    const j=await r.json();if(!r.ok)throw new Error(j.error||'Submit failed');
    step=6;maxStep=6;render();
  }catch(e){btn.disabled=false;btn.textContent='Send to my marketing specialist →';showErr('Could not send: '+e.message+'. Please try again.')}
}
render();
</script>
</body>
</html>
